<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết - HUIT Digital Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; }
        .detail-layout { display: flex; gap: 30px; margin-top: 150px; padding-bottom: 60px; flex-wrap: wrap; }
        
        /* Cột bên trái */
        .meta-sidebar {
            flex: 1; min-width: 320px; background: white; padding: 35px;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); height: fit-content;
        }
        .btn-back { background: #eee; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; color: #666; }
        
        /* Cột bên phải (Khu vực đọc) */
        .reader-zone { flex: 2.5; min-width: 500px; background: #1a1a1a; padding: 40px; border-radius: 20px; }
        .paper-sheet {
            background: white; padding: 60px; min-height: 900px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5); line-height: 1.8; color: #333;
            position: relative;
        }
        .paper-sheet::after {
            content: "HUIT DIGITAL LIBRARY - PREVIEW";
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 4rem; opacity: 0.03; width: 100%; text-align: center; pointer-events: none;
        }
        .dl-button {
            display: block; background: #27ae60; color: white; text-align: center;
            padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 25px;
        }
    </style>
</head>
<body>
    <div id="header"></div>
    <main class="container">
        <div class="detail-layout" id="root">
            <p style="text-align:center; width:100%;">Đang khởi tạo trình đọc mã nguồn...</p>
        </div>
    </main>
    <script src="js/component.js"></script>
    <script>
        async function init() {
            const p = new URLSearchParams(window.location.search);
            const type = p.get('type');
            const id = p.get('id');
            if(!id) return;

            const res = await fetch(`data/${type}.json`);
            const data = await res.json();
            const item = data.find(x => x.id == id);

            if(item) {
                document.getElementById('root').innerHTML = `
                    <aside class="meta-sidebar">
                        <button class="btn-back" onclick="history.back()">← QUAY LẠI</button>
                        <span style="color:#f39c12; font-weight:bold; font-size:0.8rem;">${(item.category || item.type).toUpperCase()}</span>
                        <h2 style="color:#0054a5; margin:15px 0 25px; line-height:1.3;">${item.title}</h2>
                        <div style="font-size:0.9rem; color:#555;">
                            <p><i class="fas fa-user"></i> <b>Tác giả:</b> ${item.author || 'Khoa CNTT'}</p>
                            <p><i class="far fa-calendar"></i> <b>Ngày đăng:</b> ${item.date || '2026'}</p>
                        </div>
                        <div style="margin-top:30px; padding:20px; background:#fdf7e3; border-radius:10px; border:1px solid #f9ebbb; font-size:0.85rem;">
                            <b>Mô tả tóm tắt:</b><br>${item.desc}
                        </div>
                        <a href="#" class="dl-button"><i class="fas fa-cloud-download-alt"></i> TẢI XUỐNG PDF</a>
                    </aside>

                    <section class="reader-zone">
                        <div class="paper-sheet">
                            <h2 style="text-align:center; border-bottom:2px solid #f4f4f4; padding-bottom:30px; margin-bottom:40px;">${item.title}</h2>
                            <div style="font-size:1.1rem; text-align:justify;">
                                ${item.content}
                            </div>
                            <div style="margin-top:100px; border-top:1px dashed #ddd; padding-top:30px; text-align:center; color:#bbb;">
                                --- HẾT PHẦN XEM TRƯỚC ---
                            </div>
                        </div>
                    </section>
                `;
            }
        }
        init();
    </script>
</body>
</html>
